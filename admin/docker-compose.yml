services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy
    container_name: caddy
    ports:
      - 80:80
      - 443:443/tcp
      - 443:443/udp
    environment:
      - CADDY_INGRESS_NETWORKS=caddy
    networks:
      - caddy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DATADIR}/caddy/data:/data
      - ${DATADIR}/caddy/config:/config
    restart: unless-stopped

  plato:
    image: josefilipeferreira/plato
    container_name: plato
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATADIR}/plato/custom:/www/assets/custom:ro
      - ${DATADIR}/plato/icons:/www/assets/icons
    environment:
      HOSTNAME: "kiwi"
      CATEGORY_ICONS: "Cloud=fas fa-cloud, Media=fas fa-photo-video, Download=fas fa-download, Tools=fas fa-toolbox, System=fas fa-tasks-alt"
      TITLE: "Kiwi dashboard"
      SUBTITLE: "Jff"
      LOGO: "assets/custom/logo.png"
      THEME: "kanagawa"
    restart: unless-stopped
    ports:
      - 8084:8080

  speedtest-tracker:
    image: lscr.io/linuxserver/speedtest-tracker
    container_name: speedtest-tracker
    ports:
      - 9092:80
    environment:
      PUID: ${PUID}
      PGID: ${PGID}
      APP_KEY: ${SPEEDTEST_TRACKER_APP_KEY}
      APP_TIMEZONE: ${TZ}
      DB_CONNECTION: sqlite
      SPEEDTEST_SCHEDULE: 0 * * * *
      PUBLIC_DASHBOARD: true
    volumes:
      - ${DATADIR}/speedtest-tracker/config:/config
    restart: unless-stopped
    labels:
      plato.category: "System"
      plato.name: "Speedtest"

  gotify:
    image: gotify/server
    container_name: gotify
    ports:
      - 2323:80
    environment:
      GOTIFY_DEFAULTUSER_PASS: ${GOTIFY_DEFAULTUSER_PASS}
    restart: unless-stopped
    networks:
      - caddy
    volumes:
      - ${DATADIR}/gotify/data:/app/data
    labels:
      # Caddy
      caddy: gotify.${WEBSITE}
      caddy.reverse_proxy: "{{upstreams 80}}"
      # Plato
      plato.category: "System"

  scrutiny:
    container_name: scrutiny
    image: ghcr.io/analogj/scrutiny:master-omnibus
    cap_add:
      - SYS_RAWIO
      - SYS_ADMIN
    ports:
      - 8888:8080
    volumes:
      - /run/udev:/run/udev:ro
      - ${DATADIR}/scrutiny/config:/config
      - ${DATADIR}/scrutiny-influxdb/config:/opt/scrutiny/influxdb
    restart: unless-stopped
    devices:
      - /dev/sda
      - /dev/sdb
      - /dev/sdc
    labels:
      plato.category: "System"

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    environment:
      INIT_ENABLED: true
      INIT_USERNAME: ${WG_USERNAME}
      INIT_PASSWORD: ${WG_PASSWORD}
      INIT_HOST: vpn.${WEBSITE}
      INIT_PORT: ${PORT_WIREGUARD}
      INIT_DNS: ${DNSMASQ_IP}
    depends_on:
      - dnsmasq
    networks:
      caddy:
        interface_name: eth1
      wg:
        interface_name: eth0
        ipv4_address: 10.42.42.42
        ipv6_address: fdcc:ad94:bacf:61a3::2a
    volumes:
      - ${DATADIR}/wg-easy/config:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - ${PORT_WIREGUARD}:${PORT_WIREGUARD}/udp
      - 51821:51821/tcp
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    labels:
      # Caddy
      caddy: vpn.${WEBSITE}
      caddy.reverse_proxy: "{{upstreams 51821}}"
      # Plato
      plato.category: "Cloud"
      plato.name: "VPN"
      plato.selfhst-icon: "wireguard"

  dnsmasq:
    image: andyshinn/dnsmasq
    container_name: dnsmasq
    volumes:
      - ${DATADIR}/dnsmasq/dnsmasq.conf:/etc/dnsmasq.conf:ro
    networks:
      caddy:
      wg:
        ipv4_address: ${DNSMASQ_IP}
    restart: unless-stopped

networks:
  wg:
    driver: bridge
    enable_ipv6: true
    ipam:
      driver: default
      config:
        - subnet: 10.42.42.0/24
        - subnet: fdcc:ad94:bacf:61a3::/64
  caddy:
    external: true
